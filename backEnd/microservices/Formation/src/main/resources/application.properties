# Application Configuration
spring.application.name=Formation
server.port=8084

# MySQL Connection
spring.datasource.url=jdbc:mysql://localhost:3306/pidb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# DÈsactiver Config Server (TR»S IMPORTANT)
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# DÈsactiver Eureka (si vous ne l'utilisez pas)
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Configuration Email Gmail avec votre mot de passe d'application
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=rania.regei@esprit.tn
spring.mail.password=gnocyzpvghyoeuiq
spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.debug=true

# DÈsactiver le health check mail pour Èviter les warnings au dÈmarrage
management.health.mail.enabled=false

# Logging niveau DEBUG pour voir les erreurs email (optionnel)
logging.level.org.springframework.mail=DEBUG
logging.level.com.sun.mail=DEBUG
# CORS et Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.location=uploads/

# Logs pour debug
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.multipart=DEBUG