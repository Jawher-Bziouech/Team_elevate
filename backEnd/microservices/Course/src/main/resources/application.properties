spring.application.name=COURSE

# Server
server.port=8086
welcome.message=welcome to course ms
spring.datasource.url=jdbc:mysql://localhost:3306/pidb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect




# Logging pour le dťbogage
logging.level.org.springdoc=DEBUG


# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Config Server (dťsactivť si non utilisť)

spring.cloud.config.import-check.enabled=false
spring.cloud.config.enabled=true
spring.config.import=optional:configserver:http://localhost:8888