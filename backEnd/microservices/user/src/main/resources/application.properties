spring.application.name=user
server.port=8024


logging.level.org.springframework.security=DEBUG


spring.datasource.url=jdbc:mysql://localhost:3306/pidb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Google
spring.security.oauth2.client.registration.google.client-id=votre-client-id
spring.security.oauth2.client.registration.google.client-secret=votre-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:9090/auth/social/callback

# Facebook
spring.security.oauth2.client.registration.facebook.client-id=votre-app-id
spring.security.oauth2.client.registration.facebook.client-secret=votre-app-secret
spring.security.oauth2.client.registration.facebook.scope=email,public_profile
spring.security.oauth2.client.registration.facebook.redirect-uri=http://localhost:9090/auth/social/callback

# GitHub
spring.security.oauth2.client.registration.github.client-id=votre-client-id
spring.security.oauth2.client.registration.github.client-secret=votre-client-secret
spring.security.oauth2.client.registration.github.scope=user:email,read:user
spring.security.oauth2.client.registration.github.redirect-uri=http://localhost:9090/auth/social/callback




# Logging pour le dťbogage
logging.level.org.springdoc=DEBUG


# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Config Server (dťsactivť si non utilisť)
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false