<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ticket résolu</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
<div style="max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px;">
    <h2 style="color: #667eea;">Ticket #<span th:text="${ticketId}"></span> résolu</h2>

    <p>Bonjour,</p>
    <p>Votre ticket a été marqué comme résolu.</p>

    <div style="background: #e8f5e8; padding: 15px; border-left: 4px solid #4CAF50; border-radius: 3px; margin: 15px 0;">
        <p><strong>Résolution :</strong></p>
        <p th:text="${resolution}" style="margin: 0;"></p>
    </div>

    <p><strong>Date de résolution :</strong> <span th:text="${#dates.format(resolutionDate, 'dd/MM/yyyy HH:mm')}"></span></p>

    <hr style="border: none; border-top: 1px solid #eee; margin: 20px 0;">
    <p style="color: #999; font-size: 12px;">Cordialement,<br>L'équipe de support</p>
</div>
</body>
</html>
