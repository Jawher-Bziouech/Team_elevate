<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Réponse à votre ticket</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
<div style="max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px;">
    <h2 style="color: #667eea;">Réponse à votre ticket #<span th:text="${ticketId}"></span></h2>

    <p>Bonjour,</p>
    <p>Votre ticket a reçu une réponse de <strong th:text="${adminName}"></strong> :</p>

    <div style="background: #f0f4ff; padding: 15px; border-left: 4px solid #667eea; border-radius: 3px; margin: 15px 0;">
        <p th:text="${adminResponse}" style="margin: 0;"></p>
    </div>

    <p><strong>Date de réponse :</strong> <span th:text="${#dates.format(responseDate, 'dd/MM/yyyy HH:mm')}"></span></p>
    <p><strong>Statut :</strong> <span th:text="${status}"></span></p>

    <div style="background: #f5f5f5; padding: 15px; border-radius: 3px; margin: 15px 0;">
        <p><strong>Description originale :</strong></p>
        <p th:text="${ticketDescription}" style="margin: 0;"></p>
    </div>

    <hr style="border: none; border-top: 1px solid #eee; margin: 20px 0;">
    <p style="color: #999; font-size: 12px;">Cordialement,<br>L'équipe de support</p>
</div>
</body>
</html>
