spring.application.name=gateway
server.port=9090
#EUREKA_Registery
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka


# ACTIVER GATEWAY
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ROUTE COURSE  (change /courses/** to /api/courses/**)
spring.cloud.gateway.routes[0].id=course
spring.cloud.gateway.routes[0].uri=lb://COURSE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/courses/**


# ROUTE TRAINING
spring.cloud.gateway.routes[1].id=certificat
spring.cloud.gateway.routes[1].uri=lb://certificat
spring.cloud.gateway.routes[1].predicates[0]=Path=/certificats/**

# ROUTE FORMATION
spring.cloud.gateway.routes[2].id=formation
spring.cloud.gateway.routes[2].uri=lb://Formation
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/formations/**

