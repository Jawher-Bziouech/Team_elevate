spring.cloud.gateway.routes[12].predicates[0]=Path=/api/obsolescence/**

# ROUTE TICKET
spring.cloud.gateway.routes[13].id=ticket
spring.cloud.gateway.routes[13].uri=lb://TICKET
spring.cloud.gateway.routes[13].predicates[0]=Path=/tickets/**

# ROUTE BADGES
spring.cloud.gateway.routes[14].id=badges
spring.cloud.gateway.routes[14].uri=lb://USER
spring.cloud.gateway.routes[14].predicates[0]=Path=/api/badges/**


# ROUTE PAYMENT
spring.cloud.gateway.routes[15].id=payment
spring.cloud.gateway.routes[15].uri=lb://Payment
spring.cloud.gateway.routes[15].predicates[0]=Path=/api/payments/**

# Global CORS Configuration for the Gateway
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
# Add this line to remove duplicate CORS headers
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
# LOGS (pour voir le load balancing)
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG

