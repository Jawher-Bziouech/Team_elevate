<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Gestion des Cours</h2>
    <button class="btn btn-primary" (click)="addBulkCourses()">
      <i class="fas fa-plus"></i> Ajouter des cours
    </button>
  </div>

  <!-- Messages -->
  <div *ngIf="successMessage" class="alert alert-success">
    {{ successMessage }}
  </div>
  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="text-center my-5">
    <div class="spinner-border text-primary"></div>
  </div>

  <!-- Table -->
  <div *ngIf="!loading" class="card">
    <div class="card-body">
      <table class="table table-hover">
        <thead>
          <tr>
            <th>ID</th>
            <th>Titre</th>
            <th>Formation</th>
            <th>Catégorie</th>
            <th>Prix</th>
            <th>Statut</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let course of courses">
            <td>{{ course.id }}</td>
            <td>{{ course.title }}</td>
            <td>
              <a href="javascript:void(0)" (click)="viewFormationCourses(course.formationId)">
                {{ course.formationName || 'Formation #' + course.formationId }}
              </a>
            </td>
            <td>{{ course.category || '-' }}</td>
            <td>{{ course.price }} €</td>
            <td>
              <span [class]="getStatusClass(course.status || '')">
                {{ course.status }}
              </span>
            </td>
            <td>
              <button class="btn btn-sm btn-warning me-2" (click)="editCourse(course.id!)">
                <i class="fas fa-edit"></i>
              </button>
              <button class="btn btn-sm btn-danger" (click)="deleteCourse(course.id!)">
                <i class="fas fa-trash"></i>
              </button>
            </td>
          </tr>
          <tr *ngIf="courses.length === 0">
            <td colspan="7" class="text-center py-4">
              Aucun cours trouvé
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
