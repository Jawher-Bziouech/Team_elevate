<div class="management-view animate-fade">
    <div class="pro-card">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold m-0 text-dark">Quiz Management</h3>
            <button class="btn-create-pro" (click)="toggleCreate()">
                {{ isCreating ? '← Back to List' : '+ Create New Quiz' }}
            </button>
        </div>

        <!-- LIST VIEW -->
        <table class="table custom-table" *ngIf="!isCreating">
            <thead>
                <tr>
                    <th>Quiz Title</th>
                    <th>Category</th>
                    <th>Questions</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let q of quizzes">
                    <td><strong>{{ q.title }}</strong></td>
                    <td><span class="user-badge" style="background: #f0fdf4; color: #16a34a">{{ q.description }}</span></td>
                    <td>{{ q.questions}} Questions</td>
                    <td>
                        <button class="btn-delete-pro" (click)="deleteQuiz(q.id!)">Delete</button>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- CREATION VIEW -->
        <div *ngIf="isCreating" class="quiz-creator animate-fade">
            <div class="form-section mb-4">
                <label>Quiz Title</label>
                <input type="text" [(ngModel)]="newQuiz.title" class="form-control-pro" placeholder="e.g. Java Advanced">
                
                <label class="mt-3">Description</label>
                <textarea [(ngModel)]="newQuiz.description" class="form-control-pro" placeholder="Brief description..."></textarea>
                
                <label class="mt-3">Duration (Minutes)</label>
                <input type="number" [(ngModel)]="newQuiz.duration" class="form-control-pro">
            </div>

            <hr class="my-5">

            <div class="questions-builder">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold">Questions Builder</h5>
                    <button class="btn btn-outline-primary btn-sm" (click)='addQuestion()'>+ Add Question</button>
                </div>

                <div *ngFor="let q of newQuiz.questions; let i = index" class="q-edit-card mb-4">
                    <div class="d-flex justify-content-between gap-3 mb-3">
                        <input type="text" [(ngModel)]="q.content" class="form-control-pro" [placeholder]="'Question ' + (i+1)">
                        <button class="btn btn-danger btn-sm" (click)="removeQuestion(i)">🗑️</button>
                    </div>

                    <div class="answers-container">
                        <div *ngFor="let a of q.answers; let ai = index" class="a-row mb-2">
                            <input type="checkbox" [(ngModel)]="a.isCorrect">
                            <input type="text" [(ngModel)]="a.text" class="form-control-pro slim" placeholder="Answer option...">
                        </div>
                        <button class="btn btn-link btn-sm p-0 text-primary" (click)="addAnswer(q)">+ Add Option</button>
                    </div>
                </div>
            </div>

            <button class="btn-save-pro mt-4" (click)="saveQuiz()">💾 Save Complete Quiz</button>
        </div>
    </div>
</div>
