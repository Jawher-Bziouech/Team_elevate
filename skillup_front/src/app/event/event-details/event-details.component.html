<div class="min-h-screen bg-gray-50 py-8">
  <div class="max-w-4xl mx-auto px-4">
    <div class="flex items-center gap-4 mb-6">
      <button routerLink="/events" class="p-2 hover:bg-gray-200 rounded-lg">
        <span class="material-icons">arrow_back</span> Retour
      </button>
      <h1 class="text-2xl font-bold">Détails de l'événement</h1>
    </div>

    <div *ngIf="isLoading" class="flex justify-center py-12">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
    </div>

    <div *ngIf="!isLoading && event" class="bg-white rounded-xl shadow-lg overflow-hidden">
      <div class="h-64 bg-gradient-to-r from-blue-500 to-purple-600"></div>

      <div class="p-8">
        <h2 class="text-3xl font-bold mb-4">{{ event.title }}</h2>
        <p class="text-gray-600 mb-6">{{ event.description }}</p>

        <div class="grid grid-cols-2 gap-6">
          <div>
            <p class="text-sm text-gray-500">Date début</p>
            <p class="font-semibold">{{ event.startDate | date:'dd/MM/yyyy HH:mm' }}</p>
          </div>
          <div>
            <p class="text-sm text-gray-500">Date fin</p>
            <p class="font-semibold">{{ event.endDate | date:'dd/MM/yyyy HH:mm' }}</p>
          </div>
          <div>
            <p class="text-sm text-gray-500">Lieu</p>
            <p class="font-semibold">{{ event.location }}</p>
          </div>
          <div>
            <p class="text-sm text-gray-500">Capacité</p>
            <p class="font-semibold">{{ event.registeredCount || 0 }}/{{ event.capacity }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
