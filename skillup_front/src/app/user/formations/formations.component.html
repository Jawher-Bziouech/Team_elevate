<!-- Contenu principal -->
<div class="container py-4">
  <h2 class="section-title">🎓 Nos Formations</h2>

  <!-- Filtres -->
  <div class="filters-section">
    <div class="row g-3">
      <div class="col-md-6">
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-search"></i></span>
          <input 
            type="text" 
            class="form-control" 
            placeholder="Rechercher une formation..."
            [(ngModel)]="searchTerm"
            (ngModelChange)="applyFilters()">
        </div>
      </div>
      <div class="col-md-4">
        <select class="form-select" [(ngModel)]="selectedCategorie" (change)="applyFilters()">
          <option value="">Toutes les catégories</option>
          <option *ngFor="let cat of categories" [value]="cat">{{cat}}</option>
        </select>
      </div>
      
    </div>
  </div>

  <!-- Message si aucune formation -->
  <div *ngIf="formations.length === 0" class="alert alert-info text-center py-5">
    <i class="fas fa-info-circle fa-3x mb-3"></i>
    <h4>Aucune formation disponible</h4>
    <p class="mb-0">Revenez plus tard ou contactez l'administrateur.</p>
  </div>

  <!-- Grille des formations - VERSION SIMPLIFIÉE -->
  <div class="formations-grid" *ngIf="formations.length > 0">
    <div class="formation-card" *ngFor="let f of filteredFormations">
      <!-- En-tête avec catégorie -->
      <div class="card-header" [ngStyle]="{'background': f.couleur}">
        <span class="badge">{{f.categorie}}</span>
      </div>
      
      <!-- Corps de la carte - SEULEMENT LE TITRE -->
      <div class="card-body text-center">
        <h3 class="card-title">{{f.titre}}</h3>
        <!-- Plus de description, plus de détails -->
      </div>
      
      <!-- Footer avec bouton Voir détails -->
      <div class="card-footer">
        <button class="btn btn-primary w-100" (click)="viewDetails(f.id!)">
          Voir détails <i class="fas fa-arrow-right ms-2"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Message si aucun résultat -->
  <div *ngIf="formations.length > 0 && filteredFormations.length === 0" 
       class="alert alert-warning text-center py-5">
    <i class="fas fa-exclamation-triangle fa-3x mb-3"></i>
    <h4>Aucune formation ne correspond</h4>
    <p class="mb-0">Essayez de modifier vos critères de recherche.</p>
  </div>
</div>
