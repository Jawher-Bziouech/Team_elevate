<div class="auth-wrapper">
  <div class="pro-signup-card animate-fade">
    <div class="auth-header">
      <div class="pro-square-logo"></div>
      <h1>SkillUp</h1>
    </div>
    
    <div class="auth-form">
      <!-- Username -->
      <div class="input-group">
        <label>Username</label>
        <input 
          type="text" 
          name="username"
          [(ngModel)]="user.username" 
          placeholder="Choose a username"
          class="form-control">  <!-- ← FERMETURE CORRECTE AVEC > -->
      </div>
      
      <!-- Email -->
      <div class="input-group mt-3">
        <label>Email</label>
        <input 
          type="email" 
          name="email"
          [(ngModel)]="user.email" 
          placeholder="Enter your email"
          class="form-control">  <!-- ← FERMETURE CORRECTE AVEC > -->
      </div>
      
      <!-- Password -->
      <div class="input-group mt-3">
        <label>Password</label>
        <input 
          type="password" 
          name="password"
          [(ngModel)]="user.password" 
          placeholder="Create a strong password"
          class="form-control">  <!-- ← FERMETURE CORRECTE AVEC > -->
      </div>

      <!-- Terms Checkbox -->
      <div class="terms-row mt-4">
        <label class="custom-checkbox">
          <input type="checkbox" name="terms" [(ngModel)]="termsAccepted">
          <span class="checkmark"></span>
          I agree to the Terms of Service and Privacy Policy
        </label>
      </div>

      <button (click)="onSignup()" class="btn-create-account mt-4">Create Account</button>
      
      <div class="auth-footer mt-4">
        <p>Already have an account?</p>
        <a routerLink="/login">Log In</a>
      </div>
    </div>
  </div>
</div>
