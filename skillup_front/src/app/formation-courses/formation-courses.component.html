<div class="container mt-4">
  <button class="btn btn-link p-0 mb-3" (click)="goBack()">
    <i class="fas fa-arrow-left"></i> Retour à la liste
  </button>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Cours de la formation #{{ formationId }}</h2>
    <button class="btn btn-primary" (click)="addBulkCourses()">
      <i class="fas fa-plus"></i> Ajouter des cours
    </button>
  </div>

  <div *ngIf="loading" class="text-center my-5">
    <div class="spinner-border text-primary"></div>
  </div>

  <div *ngIf="!loading" class="card">
    <div class="card-body">
      <table class="table">
        <thead>
          <tr>
            <th>Titre</th>
            <th>Catégorie</th>
            <th>Durée</th>
            <th>Prix</th>
            <th>Statut</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let course of courses">
            <td>{{ course.title }}</td>
            <td>{{ course.category }}</td>
            <td>{{ course.durationHours }}h</td>
            <td>{{ course.price }} €</td>
            <td>{{ course.status }}</td>
          </tr>
          <tr *ngIf="courses.length === 0">
            <td colspan="5" class="text-center py-4">
              Aucun cours pour cette formation
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
