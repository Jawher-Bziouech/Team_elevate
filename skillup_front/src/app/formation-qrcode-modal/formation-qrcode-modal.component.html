<!-- Contenu du QR Code (sans modal) -->
<div class="text-center p-3">
  <!-- QR Code avec angularx-qrcode -->
  <qrcode
    *ngIf="formation"
    [qrdata]="lienPersonnalise || formation?.videoUrl || 'http://localhost:4200/formation/' + formation?.id"
    [width]="250"
    [errorCorrectionLevel]="'M'"
    [allowEmptyString]="false">
  </qrcode>
  
  <p class="mt-3">
    Scannez ce code pour accéder à la vidéo
  </p>
  <p class="text-muted small text-truncate">
    {{lienPersonnalise || formation?.videoUrl}}
  </p>

  <!-- Bouton de téléchargement -->
  <button class="btn btn-sm btn-outline-primary mt-2" (click)="telechargerQRCode()">
    <i class="fas fa-download me-1"></i> Télécharger
  </button>
</div>
